site_name: Contract2Agent
site_description: Pre-runtime evaluation, capability classification, and cautious outcome prediction for AI agents.

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.tabs.link

nav:
  - Home: index.md
  - Agent Evaluation: agent-eval/index.html
  - Interactive Demo: demo.md
  - Playground: playground/index.html
  - Getting Started:
      - Overview: getting-started.md
      - CLI Reference: cli.md
      - Configuration: configuration.md
      - Reports: reports.md
  - Diagnostic Modes:
      - Triage: triage.md
      - Quick Check: quick.md
      - Deep Diagnosis: deep.md
      - Auto Mode: auto.md
  - Core Features:
      - File Reading Eval:
          - Overview: file-reading-eval/README.md
          - CLI Guide: file-reading-eval/cli-guide.md
          - Sample Run: file-reading-eval/sample-run.md
          - Report Examples: file-reading-eval/report-examples.md
          - zh-CN: file-reading-eval/README.zh-CN.md
          - zh-CN CLI Guide: file-reading-eval/cli-guide.zh-CN.md
          - zh-CN Sample Run: file-reading-eval/sample-run.zh-CN.md
          - zh-CN Report Examples: file-reading-eval/report-examples.zh-CN.md
      - Failure Taxonomy: failure-taxonomy.md
      - Baselines: baselines.md
      - Patch Preview: patch-preview.md
      - Time Cost: time-cost.md
  - Examples:
      - Examples: examples.md
  - Development:
      - Development Guide: development.md
      - Audits:
          - 2026-05-04 Bug Audit: audits/2026-05-04-bug-audit.md
          - 2026-05-04 Test System Audit: audits/2026-05-04-test-system-audit.md

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences

extra_javascript:
  - assets/js/contract2agent-demo.js
  - javascripts/contract2agent-playground.js

extra_css:
  - assets/css/contract2agent-demo.css
  - stylesheets/contract2agent-playground.css
